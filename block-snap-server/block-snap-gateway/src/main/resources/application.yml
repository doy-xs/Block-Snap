server:
  port: 80 # 外部访问整个微服务系统的统一入口端口

spring:
  application:
    name: gateway-service # 网关自己的名字
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        username: nacos
        password: nacos
    gateway:
      # 【新增】：全局跨域配置
      globalcors:
        add-to-simple-url-handler-mapping: true # 极其重要：解决 OPTIONS 预检请求被网关拦截导致跨域失败的问题
        cors-configurations:
          '[/**]': # 拦截所有请求路径
            allowedOriginPatterns: "*" # 允许所有的源头（前端所在域名/IP）。Spring Boot 2.4 之后强烈建议用 allowedOriginPatterns 代替 allowedOrigins
            allowedMethods: # 允许所有的 HTTP 方法
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*" # 允许所有的请求头（比如我们自定义的 Authorization, X-User-Id 等）
            allowCredentials: true # 允许前端携带 Cookie 等凭证
            maxAge: 3600 # 跨域允许的缓存时间（秒），避免浏览器每次都发 OPTIONS 请求探测

      routes:
        # 路由 1：转发给系统管理服务
        - id: system_route              # 路由的唯一 ID，随便起，但不准重复
          uri: lb://block-snap-system      # lb 代表 LoadBalance(负载均衡)，后面跟着 Nacos 里的服务名
          predicates:
            - Path=/sys-user/** # 拦截规则：只要路径是以 /sys-user/ 开头的，全转走
        - id: service_route
          uri: lb://block-snap-service
          predicates:
            - Path=/svc-instance/**,/svc-snapshot/**,/svc-mod/**

  data:
    redis:
      host: 127.0.0.1
      port: 6380
      password:      # 如果有密码请填写
      database: 0
      lettuce:
        pool:
          max-active: 8 # 连接池配置